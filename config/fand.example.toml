# fand example config — install to /etc/fand/config.toml
# Values below match the verified target hardware (ASRock B650E Taichi /
# NCT6799D, Ryzen 7 7800X3D via k10temp, RTX 4090 via NVML).
#
# Model: a curve owns its temperature source; a channel binds exactly one
# curve. Mixing is a curve kind that combines other curves' outputs.

[daemon]
tick_seconds = 2

[sensors.cpu]
kind = "hwmon"
hwmon_name = "k10temp"
input = "temp1_input"      # Tctl

[sensors.gpu]
kind = "nvml"
device_index = 0

[curves.cpu_rad]
kind = "graph"
sensor = "cpu"
points = [[40, 80], [60, 130], [75, 200], [85, 255]]
# Optional input-side hysteresis (any graph curve). The temp feeding the
# curve only moves after departing the last accepted value by the given
# margin AND staying out for response_seconds — kills fan hunting on spiky
# sensors like Tctl. Defaults: 0 / 0 / 0 (off). At the curve's endpoint
# temps hysteresis is bypassed (ignore_hysteresis_at_extremes = true) so a
# real spike still reaches full duty immediately.
#hysteresis_up = 2.0        # °C rise needed to accept a higher temp
#hysteresis_down = 3.0      # °C fall needed to accept a lower temp
#response_seconds = 5       # change must persist this long

[curves.cpu_case]
kind = "graph"
sensor = "cpu"
points = [[45, 90], [70, 160], [85, 255]]

[curves.gpu_case]
kind = "graph"
sensor = "gpu"
points = [[45, 90], [60, 140], [75, 255]]

# Case mix: max-of-outputs across the CPU and GPU case curves — whichever
# component demands the most cooling wins. Never change `function` away
# from "max" without understanding that min/average can under-cool the
# hotter component.
[curves.case_mix]
kind = "mix"
function = "max"
curves = ["cpu_case", "gpu_case"]

# Trigger curve (any channel except pwm1 — a step function is wrong for the
# pump). Two duties latched across a temperature deadband: idle below
# idle_temp, load above load_temp, holding state in between so it never
# hunts. A crossing must persist response_seconds before it flips. Bind it
# to a channel to use it.
#[curves.case_trigger]
#kind = "trigger"
#sensor = "cpu"
#idle_temp = 45            # °C at/below which it latches to idle_pwm
#idle_pwm = 90
#load_temp = 65            # °C at/above which it latches to load_pwm
#load_pwm = 200
#response_seconds = 5      # a crossing must hold this long to flip (0 = instant)

# pwm1: Arctic Liquid Freezer II 360 — pump + VRM fan + 3 rad fans all share
# this one PWM signal; coolant thermal mass justifies the longer smoothing
# window. Pump runs at its 800 RPM minimum below ~40% duty; firmware auto
# idles this system at 77/255 (~30%) without issue, so min_pwm = 80 stays
# at/above the observed-safe floor (the daemon rejects anything lower on
# pwm1).
[channels.pwm1]
hwmon_name = "nct6799"
curve = "cpu_rad"
min_pwm = 80
smoothing_seconds = 12
max_step_up = 10
max_step_down = 3

# pwm2: case fans (via Lancool 216 built-in controller, PWM passthrough).
[channels.pwm2]
hwmon_name = "nct6799"
curve = "case_mix"
min_pwm = 70
smoothing_seconds = 5
max_step_up = 10
max_step_down = 3
# Optional signed bias added to the curve output before the min_pwm..255
# clamp — lets a channel share another's curve at a fixed offset. The floor
# still wins, so a negative offset can never stall the fan. Default 0.
#offset_pwm = -15
